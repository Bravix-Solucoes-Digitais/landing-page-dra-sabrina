<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replica Studio Pro</title>
    <style>
        :root {
            --accent: #f97316;
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
        }

        /* Camada de Fundo: Desktop */
        .desktop-layer {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            width: calc(100% - 410px); /* Otimizado para o novo tamanho do mobile */
            height: 94vh; /* Quase a altura toda */
            z-index: 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.8), 
                0 0 40px rgba(212, 175, 55, 0.15),
                0 0 10px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.5);
            transition: all 0.5s ease;
        }

        iframe#desktop-frame {
            width: 100%; height: 100%;
            border: none;
            background: #fff;
        }

        /* Camada de Cima: Mobile Simulator */
        .mobile-layer {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .mobile-layer.hidden {
            transform: scale(0.5) translateY(200px);
            opacity: 0;
            pointer-events: none;
        }

        .phone-frame {
            width: 360px; /* Aumentado de 330px */
            height: 780px; /* Aumentado de 715px */
            background: #000;
            border-radius: 45px;
            padding: 10px;
            box-shadow: 
                0 50px 100px rgba(0,0,0,1), 
                0 0 50px rgba(212, 175, 55, 0.2),
                0 0 15px rgba(212, 175, 55, 0.3);
            border: 1.5px solid rgba(212, 175, 55, 0.6);
            position: relative;
        }

        .screen {
            width: 100%; height: 100%;
            border-radius: 32px;
            overflow: hidden;
            background: #fff;
        }

        iframe#mobile-frame {
            width: 100%; height: 100%;
            border: none;
        }

        /* Painel de Controle Flutuante */
        .controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            padding: 6px 12px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        button {
            background: transparent;
            border: none;
            color: #999;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 20px;
        }

        button:hover { color: #fff; background: rgba(255,255,255,0.05); }
        button.active { color: #fff; background: var(--accent); }

        /* Badge Lateral para reabrir celular */
        .reopen-trigger {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 50px; height: 50px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.4);
            opacity: 0;
            transform: scale(0.8);
            transition: 0.3s;
            z-index: 101;
        }

        .reopen-trigger.visible {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <!-- Desktop ao fundo -->
    <div class="desktop-layer">
        <iframe id="desktop-frame" src="/"></iframe>
    </div>

    <!-- Mobile Flutuante -->
    <div class="mobile-layer" id="mobile-container">
        <div class="phone-frame">
            <div class="screen">
                <iframe id="mobile-frame" src="/"></iframe>
            </div>
        </div>
    </div>

    <!-- Gatilho para reabrir caso feche -->
    <div id="trigger" class="reopen-trigger" onclick="toggleMobile()">📱</div>

    <script>
        const mobileContainer = document.getElementById('mobile-container');
        const trigger = document.getElementById('trigger');
        const toggleBtn = document.getElementById('toggle-mobile');

        function toggleMobile() {
            const isHidden = mobileContainer.classList.toggle('hidden');
            trigger.classList.toggle('visible', isHidden);
            toggleBtn.classList.toggle('active', !isHidden);
        }

        toggleBtn.onclick = toggleMobile;
    </script>
</body>
</html>
